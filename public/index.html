<script>
    // Functions defined globally for reusability
    function HideDialog() {
        $("#popupOverlay").fadeOut(400);
        $("#onload_popup").fadeOut(400);
    }

    function ShowDialog(delayTime) {
        // Agar dynamic delay dena ho toh feature rakha hai, default 0
        var t = delayTime || 0;
        $("#popupOverlay").delay(t).fadeIn(t === 0 ? 10 : 400);
        $("#onload_popup").delay(t).fadeIn(t === 0 ? 10 : 400);
    }

    $(document).ready(function() {
        
        // 1. Session check karke popup auto-show karna
        if (!JSON.parse(sessionStorage.getItem("popupShown"))) {
            if (!$(".thankyou-content-wrapper").hasClass('has-thank-you')) {
                // delay values pehle jaisi hi rakhi hain
                $("#popupOverlay").delay(1800).fadeIn(400);
                $("#onload_popup").delay(2000).fadeIn(400);

                sessionStorage.setItem("popupShown", "true");
            }
        }

        // 2. Close button click event (sirf EK baar bind hoga)
        $("#btnClose").click(function(e) {
            e.preventDefault();
            HideDialog();
        });

        // 3. Manual trigger button click event
        $("#show-popup").click(function() {
            if (!$(".thankyou-content-wrapper").hasClass("has-thank-you")) {
                ShowDialog(0); // instant show
            }
        });
        
    });
</script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      const video = document.getElementById("heroVideo");

      if (!video) {
        console.warn("heroVideo not found");
        return;
      }

      const source = video.querySelector("source");

      if (!source) {
        console.warn("video source not found");
        return;
      }

      function loadVideo() {
        source.src = source.dataset.src;
        video.load();

        const playPromise = video.play();
        if (playPromise !== undefined) {
          playPromise.catch(err => {
            console.log("Autoplay blocked:", err);
          });
        }
      }

      if ("requestIdleCallback" in window) {
        requestIdleCallback(loadVideo);
      } else {
        setTimeout(loadVideo, 1200);
      }

    });
  </script>

  <script>
    function showTab(tabIndex) {
      const tabs = document.querySelectorAll('.development-tab');
      const contents = [document.getElementById('development-tab-content-0'), document.getElementById('development-tab-content-1')];

      tabs.forEach((tab, i) => {
        tab.classList.toggle('active', i === tabIndex);
        contents[i].style.display = i === tabIndex ? 'block' : 'none';
      });
    }
  </script>
  <script>
  const hiddenFaqs = document.querySelectorAll(".faq-item.more");
const toggleBtn = document.getElementById("toggleFaqBtn");

if (toggleBtn) {
  toggleBtn.addEventListener("click", () => {
    const isHidden =
      hiddenFaqs.length > 0 &&
      hiddenFaqs[0].classList.contains("hidden");

    hiddenFaqs.forEach((faq) => {
      faq.classList.toggle("hidden");
    });

    toggleBtn.innerText = isHidden ? "Show Less" : "Show More";
  });
}
  </script>

  <script>
   $(document).ready(function () {

    const $carousel = $('.industries-carousel');

    if ($carousel.length === 0) {
        console.error("industries-carousel not found in DOM");
        return;
    }

    // Industries slider
    $carousel.owlCarousel({
        items: 3,
        loop: true,
        margin: 24,
        nav: false,
        dots: false,
        responsive: {
            0: { items: 1 },
            600: { items: 2 },
            900: { items: 3 }
        }
    });

    // Custom navigation
    $('.industries-nav .custom-prev').on('click', function () {
        $carousel.trigger('prev.owl.carousel');
    });

    $('.industries-nav .custom-next').on('click', function () {
        $carousel.trigger('next.owl.carousel');
    });

    // Custom dots (FIXED dynamic count)
    const numIndSlides = $('.industries-carousel .slide').length;

    $('.industries-dots').empty();

    for (let i = 0; i < numIndSlides; i++) {
        $('.industries-dots').append(
            '<span class="dot' + (i === 0 ? ' active' : '') + '"></span>'
        );
    }

    $('.industries-dots .dot').on('click', function () {
        $carousel.trigger('to.owl.carousel', [$(this).index(), 300]);
    });

    $carousel.on('changed.owl.carousel', function (event) {
        let idx = event.item.index - event.relatedTarget._clones.length / 2;
        idx = ((idx % numIndSlides) + numIndSlides) % numIndSlides;

        $('.industries-dots .dot')
            .removeClass('active')
            .eq(idx)
            .addClass('active');
    });

});
  </script>
